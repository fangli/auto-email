name: Release

on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -count=1

      - name: Generate Windows resources
        run: go install github.com/tc-hib/go-winres@latest && go-winres make

      - name: Build all targets
        run: |
          version="${GITHUB_REF_NAME#release-}"
          gitrev="${GITHUB_SHA::7}"
          ldflags="-s -w -X main.version=${version} -X main.gitRev=${gitrev}"
          mkdir -p dist

          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"

            echo "Building $os/$arch..."
            GOOS=$os GOARCH=$arch go build -ldflags="${ldflags}" -o "dist/auto-email${ext}" .

            archive_name="auto-email-${version}-${os}-${arch}"
            mkdir -p "dist/${archive_name}"
            cp -rf email_template_example README.md "dist/${archive_name}/"
            cp -rf "dist/auto-email${ext}" "dist/${archive_name}/email_template_example/"

            cd dist
            if [ "$os" = "windows" ]; then
              zip "${archive_name}.zip" -r "${archive_name}"
            else
              tar czf "${archive_name}.tar.gz" "${archive_name}"
            fi
            cd ..

            rm -rf "dist/${archive_name}" "dist/auto-email${ext}"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#release-}"
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "v${version}" \
            --generate-notes
